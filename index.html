<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chinese Learning">
    <meta name="author" content="Lillian Wang">
    <meta name="description" content="Chinese Learning App for CHI 108 - Princeton University">
    <meta name="theme-color" content="#e11d48">
    <title>Chinese Learning App - CHI 108</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- PWA Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Hero fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

    <!-- Hanzi Writer for stroke order animations (global HanziWriter) -->
    <!-- defer: downloads in parallel with HTML parsing, executes in order before DOMContentLoaded -->
    <!-- No crossorigin: keeps HTTP cache compatible (cors/no-cors use separate cache entries) -->
    <script defer src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

    <!-- Firebase SDKs (global firebase) -->
    <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker + Puter.js: both deferred until after window.load so they
         don't block the browser's loading bar or get intercepted by the SW -->
    <script>
        window.addEventListener('load', function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js')
                    .then(function(reg) { console.log('Service Worker registered:', reg.scope); })
                    .catch(function(err) { console.log('Service Worker registration failed:', err); });
            }
            // Defer Puter.js injection to the next event-loop turn so it is
            // fully decoupled from the load event. In Safari on macOS, appending
            // a <script> element synchronously inside the load handler can
            // re-activate the browser's loading indicator (spinning favicon /
            // URL-bar progress bar) while the script downloads. Scheduling via
            // setTimeout(0) moves the injection past the load-event flush,
            // preventing Safari from associating this network request with the
            // page's loading lifecycle. The explicit async=true makes this
            // intent clear to all browsers (dynamic scripts default to async,
            // but being explicit helps older Safari versions honour it).
            setTimeout(function() {
                var s = document.createElement('script');
                s.src = 'https://js.puter.com/v2/';
                s.async = true;
                s.onload = function() { console.log('Puter.js loaded successfully'); };
                s.onerror = function() { console.error('Failed to load Puter.js'); };
                document.head.appendChild(s);
            }, 0);
        });
    </script>
</body>
</html>
